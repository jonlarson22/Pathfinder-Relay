<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder Communication Relay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Empty for the Typewriter effect -->
    <h2 id="sol-title"></h2>

    <!-- Wrap the rest of the UI so we can fade it in after typing -->
    <div id="ui-container">
        <!-- Bottom Corner Images Only -->
        <img src="images/astronaut_illustration.png" id="astronaut" class="scene-element corner-scene" alt="Astronaut">
        <img src="images/rover_illustration.png" id="main-rover" class="scene-element corner-scene" alt="Main Rover">

        <div id="mars-base">
            <div id="dial-rim"></div>
            <div id="rover-anchor">
                <div id="camera-sprite">📷</div> 
            </div>
            <div id="ring"></div>
        </div>

        <div class="controls">
            <button id="btn-1" onclick="playSequence('msg1')">RECEIVE MESSAGE 1</button>
            <button id="btn-2" onclick="playSequence('msg2')">RECEIVE MESSAGE 2</button>
            <button id="btn-3" onclick="playSequence('msg3')">RECEIVE MESSAGE 3</button>
        </div>

        <div id="status-container">
            <p id="status">STANDING BY...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
